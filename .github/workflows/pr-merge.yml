name: CI

on:
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests with Docker
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from api

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: test
    if: github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Auto-merge PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const { owner, repo, number } = context.issue;
            
            console.log("=== AUTO-MERGE DEBUG INFO ===");
            console.log(`Event: ${context.eventName}`);
            console.log(`Ref: ${context.ref}`);
            console.log(`SHA: ${context.sha}`);
            console.log(`Actor: ${context.actor}`);
            console.log(`Repository: ${context.repository}`);
            console.log(`PR #${number} in ${owner}/${repo}`);

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number,
            });

            console.log('PR details:', {
              number: pr.data.number,
              title: pr.data.title,
              head: pr.data.head.ref,
              base: pr.data.base.ref,
              mergeable: pr.data.mergeable,
              mergeable_state: pr.data.mergeable_state,
              headRepo: pr.data.head.repo.full_name,
              state: pr.data.state
            });

            // Check conditions
            if (pr.data.head.repo.full_name !== `${owner}/${repo}`) {
              console.log('❌ PR from fork, skipping auto-merge');
              return;
            }
            console.log('✅ PR from same repository');

            if (!pr.data.mergeable) {
              console.log('❌ PR not mergeable, skipping auto-merge');
              console.log(`Mergeable state: ${pr.data.mergeable_state}`);
              return;
            }
            console.log('✅ PR is mergeable');

            // Check if PR is still open
            if (pr.data.state !== 'open') {
              console.log('❌ PR not open, skipping auto-merge');
              return;
            }
            console.log('✅ PR is open');

            console.log('🚀 Attempting to merge...');

            try {
              const mergeResult = await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: number,
                commit_title: `Auto-merge PR #${number}: ${pr.data.title}`,
                merge_method: 'merge'  // Changed from 'squash' to ensure proper push
              });

              console.log('✅ Merge successful!');
              console.log(`🎉 Successfully merged PR #${number}`);
              console.log('🚀 Push to master should be detected by Render');
            } catch (error) {
              console.error(`❌ Failed to merge PR #${number}:`, error.message);
            }