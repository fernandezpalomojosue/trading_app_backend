name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests with Docker
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from api

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Wait for test job completion
        run: sleep 120

      - name: Auto-merge PR
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo, number } = context.issue;
            
            console.log(`Processing PR #${number} in ${owner}/${repo}`);
            
            // Get PR details FIRST
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number,
            });
            
            console.log('PR details:', {
              number: pr.data.number,
              title: pr.data.title,
              head: pr.data.head.ref,
              base: pr.data.base.ref,
              mergeable: pr.data.mergeable,
              headRepo: pr.data.head.repo.full_name
            });
            
            // Check if PR is from a trusted source (same repository)
            if (pr.data.head.repo.full_name !== `${owner}/${repo}`) {
              console.log('❌ PR from fork, skipping auto-merge');
              return;
            }
            
            console.log('✅ PR from same repository');
            
            // Check if PR is mergeable and has no conflicts
            if (!pr.data.mergeable) {
              console.log('❌ PR has conflicts, skipping auto-merge');
              return;
            }
            
            console.log('✅ PR is mergeable');
            
            // Check workflow runs instead of status checks
            console.log('� Checking workflow runs...');
            
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              head_sha: pr.data.head.sha,
              event: 'pull_request'
            });
            
            console.log(`🔍 Found ${runs.data.workflow_runs.length} workflow runs`);
            
            // Find the test workflow run
            const testRun = runs.data.workflow_runs.find(run => 
              run.name === 'CI' && 
              run.head_sha === pr.data.head.sha &&
              run.status === 'completed' &&
              run.conclusion === 'success'
            );
            
            console.log(`🔍 Test run found:`, testRun ? {
              name: testRun.name,
              status: testRun.status,
              conclusion: testRun.conclusion,
              created_at: testRun.created_at
            } : 'NONE');
            
            if (!testRun) {
              console.log('❌ Test workflow not completed successfully, skipping auto-merge');
              console.log('🔍 Available runs:', runs.data.workflow_runs.map(r => ({
                name: r.name,
                status: r.status,
                conclusion: r.conclusion,
                head_sha: r.head_sha
              })));
              return;
            }
            
            console.log('✅ Test workflow completed successfully, proceeding with merge');
            
            // Merge PR
            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: number,
                commit_title: `Auto-merge PR #${number}: ${pr.data.title}`,
                merge_method: 'squash'
              });
              
              console.log(`🎉 Successfully merged PR #${number}`);
            } catch (error) {
              console.error(`❌ Failed to merge PR #${number}:`, error.message);
            }
