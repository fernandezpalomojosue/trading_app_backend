name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests with Docker
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from api

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Wait for status checks
        run: sleep 60

      - name: Auto-merge PR
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo, number } = context.issue;
            
            console.log(`Processing PR #${number} in ${owner}/${repo}`);
            
            // Retry mechanism to wait for status checks
            let retries = 5;
            let status = null;
            
            while (retries > 0) {
              console.log(`🔄 Checking status checks... (${6 - retries}/5 attempts)`);
              
              status = await github.rest.repos.getCombinedStatusForRef({
                owner,
                repo,
                ref: pr.data.head.sha,
              });
              
              if (status.data.statuses.length > 0) {
                console.log(`✅ Found ${status.data.statuses.length} status checks`);
                break;
              }
              
              console.log(`⏳ No status checks yet, waiting 30 seconds...`);
              await new Promise(resolve => setTimeout(resolve, 30000));
              retries--;
            }
            
            if (status.data.statuses.length === 0) {
              console.log('❌ No status checks found after 5 attempts, skipping auto-merge');
              return;
            }
            
            // Get PR details
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number,
            });
            
            console.log('PR details:', {
              number: pr.data.number,
              title: pr.data.title,
              head: pr.data.head.ref,
              base: pr.data.base.ref,
              mergeable: pr.data.mergeable,
              headRepo: pr.data.head.repo.full_name
            });
            
            // Check if PR is from a trusted source (same repository)
            if (pr.data.head.repo.full_name !== `${owner}/${repo}`) {
              console.log(' PR from fork, skipping auto-merge');
              return;
            }
            
            console.log(' PR from same repository');
            
            // Check if PR is mergeable and has no conflicts
            if (!pr.data.mergeable) {
              console.log(' PR has conflicts, skipping auto-merge');
              return;
            }
            
            console.log(' PR is mergeable');
            
            // Get all status checks
            const status = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: pr.data.head.sha,
            });
            
            console.log(' All status checks:', JSON.stringify(status.data.statuses, null, 2));
            
            console.log('🔍 Available status check contexts:', status.data.statuses.map(s => s.context));
            console.log('🔍 Full status check details:', JSON.stringify(status.data.statuses, null, 2));
            
            // Look for any status check that contains 'test' or 'ci'
            const testCheck = status.data.statuses.find(s => 
              s.context.toLowerCase().includes('test') || 
              s.context.toLowerCase().includes('ci')
            );
            
            // Also try exact matches for common patterns
            const exactMatches = ['test', 'ci', 'test (1)', 'ci (1)'];
            const exactCheck = status.data.statuses.find(s => 
              exactMatches.includes(s.context)
            );
            
            console.log(`🔍 Found test/ci-related check:`, testCheck ? testCheck.context : 'NONE');
            console.log(`🔍 Found exact match:`, exactCheck ? exactCheck.context : 'NONE');
            
            // Use either check (flexible or exact)
            const finalCheck = testCheck || exactCheck;
            
            if (!finalCheck || finalCheck.state !== 'success') {
              console.log('❌ No suitable check found or not passed, skipping auto-merge');
              console.log('❌ Final check used:', finalCheck ? finalCheck.context : 'NONE');
              console.log('❌ Final check state:', finalCheck ? finalCheck.state : 'NONE');
              return;
            }
            
            console.log('✅ Using check for merge:', finalCheck.context);
            console.log('✅ Test/CI check passed, proceeding with merge');
            
            // Merge PR
            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: number,
                commit_title: `Auto-merge PR #${number}: ${pr.data.title}`,
                merge_method: 'squash'
              });
              
              console.log(` Successfully merged PR #${number}`);
            } catch (error) {
              console.error(` Failed to merge PR #${number}:`, error.message);
            }
