name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests with Docker
        run: |
          docker compose -f docker-compose.test.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from api

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Auto-merge PR
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo, number } = context.issue;
            
            console.log(`Processing PR #${number} in ${owner}/${repo}`);
            
            // Get PR details
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number,
            });
            
            console.log('PR details:', {
              number: pr.data.number,
              title: pr.data.title,
              head: pr.data.head.ref,
              base: pr.data.base.ref,
              mergeable: pr.data.mergeable,
              headRepo: pr.data.head.repo.full_name
            });
            
            // Check if PR is from a trusted source (same repository)
            if (pr.data.head.repo.full_name !== `${owner}/${repo}`) {
              console.log(' PR from fork, skipping auto-merge');
              return;
            }
            
            console.log(' PR from same repository');
            
            // Check if PR is mergeable and has no conflicts
            if (!pr.data.mergeable) {
              console.log(' PR has conflicts, skipping auto-merge');
              return;
            }
            
            console.log(' PR is mergeable');
            
            // Get all status checks
            const status = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: pr.data.head.sha,
            });
            
            console.log(' All status checks:', status.data.statuses.map(s => ({
              context: s.context,
              state: s.state,
              description: s.description
            })));
            
            // Check required status checks (all tests passed)
            const requiredChecks = ['test'];
            console.log(' Looking for required checks:', requiredChecks);
            
            const allChecksPassed = requiredChecks.every(check => {
              const checkStatus = status.data.statuses.find(s => s.context === check);
              const passed = checkStatus && checkStatus.state === 'success';
              console.log(`  ${check}: ${passed ? ' ' : ' '} (${checkStatus ? checkStatus.state : 'NOT FOUND'})`);
              return passed;
            });
            
            if (!allChecksPassed) {
              console.log(' Not all required checks passed, skipping auto-merge');
              console.log(' Available contexts:', status.data.statuses.map(s => s.context));
              return;
            }
            
            console.log(' All required checks passed, proceeding with merge');
            
            // Merge PR
            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: number,
                commit_title: `Auto-merge PR #${number}: ${pr.data.title}`,
                merge_method: 'squash'
              });
              
              console.log(` Successfully merged PR #${number}`);
            } catch (error) {
              console.error(` Failed to merge PR #${number}:`, error.message);
            }
