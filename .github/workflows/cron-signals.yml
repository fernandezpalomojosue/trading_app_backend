name: Run Signals Cron Job
on:
  schedule:
    - cron: '*/15 * * * *'  
  workflow_dispatch:  # Allow manual triggering
jobs:
  run-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run signals
        run: |
          curl -X POST https://tu-api.onrender.com/internal/run-signals \
          -H "Content-Type: application/json" \
          -H "x-api-key: ${{ secrets.SIGNAL_WORKER_API_KEY }}"
