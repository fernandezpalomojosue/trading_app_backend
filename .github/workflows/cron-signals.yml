name: Run Signals Cron Job
on:
  schedule:
    - cron: '*/15 * * * *'  
  workflow_dispatch:  # Allow manual triggering
jobs:
  run-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run signals
        run: |
          echo "🔍 Debug: Checking if secret exists..."
          if [ -n "${{ secrets.SIGNAL_WORKER_API_KEY }}" ]; then
            echo "✅ Secret found, length: $(echo -n "${{ secrets.SIGNAL_WORKER_API_KEY }}" | wc -c)"
          else
            echo "❌ Secret is empty or missing"
          fi
          echo "🔍 Debug: Making request..."
          curl -X POST https://trading-app-backend-2ykk.onrender.com/api/v1/signals/internal/run-signals \
          -H "Content-Type: application/json" \
          -H "x-api-key: ${{ secrets.SIGNAL_WORKER_API_KEY }}" \ -v
