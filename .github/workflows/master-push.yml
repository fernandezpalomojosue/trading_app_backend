name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Log deployment info
        run: |
          echo "🚀 DEPLOYMENT TRIGGERED BY SUCCESSFUL CI!"
          echo "📊 Workflow: ${{ github.event.workflow_run.name }}"
          echo "🔗 Repository: ${{ github.repository }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo "📅 Timestamp: $(date)"
          echo ""
          echo "✅ CI completed successfully - triggering deployment..."
          echo "🔍 This should trigger Render auto-deploy"
          echo "📋 If deploy doesn't start, check:"
          echo "   1. Render Auto-Deploy is configured correctly"
          echo "   2. Branch is set to 'master' in Render"
          echo "   3. Render webhook is active"

  