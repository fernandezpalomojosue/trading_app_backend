name: Deploy to Production

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Log deployment info
        run: |
          echo "🚀 PUSH TO MASTER DETECTED!"
          echo "📊 Commit: ${{ github.sha }}"
          echo "🔗 Repository: ${{ github.repository }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo "📅 Timestamp: $(date)"
          echo ""
          echo "✅ Push triggered by PAT merge - triggering deployment..."
          echo "🔍 Render should detect this push and auto-deploy"
          echo "📋 If deploy doesn't start, check:"
          echo "   1. Render Auto-Deploy is configured correctly"
          echo "   2. Branch is set to 'master' in Render"
          echo "   3. PAT has repo and workflow permissions"

  