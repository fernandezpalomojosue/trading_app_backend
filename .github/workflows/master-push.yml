name: Master Push Detection

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-push:
    name: Detect Master Push
    runs-on: ubuntu-latest
    
    steps:
      - name: Log push info
        run: |
          echo "🚀 PUSH TO MASTER DETECTED!"
          echo "📊 Commit: ${{ github.sha }}"
          echo "🔗 Repository: ${{ github.repository }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo "📅 Timestamp: $(date)"
          echo ""
          echo "🔍 Render should detect this push and auto-deploy..."
          echo "📋 If deploy doesn't start, check:"
          echo "   1. Render Auto-Deploy is set to 'After CI Checks Pass'"
          echo "   2. GitHub Actions are completing successfully"
          echo "   3. Branch is set to 'master' in Render"

  